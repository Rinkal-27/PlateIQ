name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Expo's static web export. Output lands in dist/.
      - name: Export web bundle
        env:
          # When hosting at https://<user>.github.io/<repo>/ the assets must use
          # the sub-path. Override this in repo Settings → Secrets → Variables if
          # you publish to a root domain.
          EXPO_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/
        run: npx expo export --platform web

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
