<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16A34A"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Plate -->
  <circle cx="256" cy="248" r="148" fill="#F4F6FB" stroke="url(#ring)" stroke-width="14"/>
  <circle cx="256" cy="248" r="118" fill="none" stroke="#243047" stroke-width="3" stroke-dasharray="4 6" opacity="0.45"/>

  <!-- Magnifier handle -->
  <rect x="332" y="324" width="76" height="22" rx="11" transform="rotate(45 370 335)" fill="url(#ring)"/>

  <!-- Magnifier ring -->
  <circle cx="316" cy="288" r="56" fill="none" stroke="url(#ring)" stroke-width="22"/>

  <!-- IQ letterforms -->
  <g fill="#0B1220" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="900" text-anchor="middle">
    <text x="218" y="282" font-size="120">P</text>
  </g>
</svg>
